<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>Spinophore | Minecraft Builder</title>
    <meta name="title" content="Spinophore | Minecraft Builder">
    <meta name="description" content="Spinophore – Minecraft Builder. Portfolio de builds : architecture, organique, terraforming, painting/texturing et 3D (Blender).">
    <meta name="keywords" content="Minecraft, Builder, Spinophore, Build, Map, Terraforming, Blender, WorldMachine, Endorah, Historycraft">
    <meta name="author" content="Spinophore">
    <meta name="robots" content="index, follow">
    <meta name="language" content="French">
    <meta name="revisit-after" content="7 days">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">
    
    <!-- Open Graph / Facebook / Discord -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://swtori.github.io/spinophore/">
    <meta property="og:title" content="Spinophore | Minecraft Builder">
    <meta property="og:description" content="Spinophore – Minecraft Builder. Portfolio : architecture, organique, terraforming, painting/texturing et 3D (Blender).">
    <meta property="og:image" content="https://swtori.github.io/spinophore/img/chateau_japonais_minecraft.png">
    <meta property="og:image:secure_url" content="https://swtori.github.io/spinophore/img/chateau_japonais_minecraft.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Château japonais Spinophore – Build Minecraft">
    <meta property="og:image:type" content="image/png">
    <meta property="og:locale" content="fr_FR">
    <meta property="og:site_name" content="Spinophore Portfolio">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://spinophore.github.io/spinophore/">
    <meta name="twitter:title" content="Spinophore | Minecraft Builder">
    <meta name="twitter:description" content="Spinophore – Minecraft Builder. Portfolio : architecture, organique, terraforming, painting/texturing et 3D (Blender).">
    <meta name="twitter:image" content="https://spinophore.github.io/spinophore/img/chateau_japonais_minecraft.png">
    <meta name="twitter:image:alt" content="Château japonais Spinophore – Build Minecraft">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://spinophore.github.io/spinophore/">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#f5f0e6">
    <meta name="msapplication-TileColor" content="#f5f0e6">
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;500;600;700&display=block" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-top">
            <div class="header-nav">
                <a href="#projets" class="header-nav-btn" data-i18n="projetsTitle">Projets</a>
                <a href="#contact" class="header-nav-btn" data-i18n="contactTitle">Contact</a>
                <a href="#about" class="header-nav-btn" data-i18n="aboutTitle">À propos</a>
            </div>
            <div class="lang-selector">
                <button class="lang-btn active" data-lang="fr" aria-label="Français">FR</button>
                <button class="lang-btn" data-lang="en" aria-label="English">EN</button>
                <button class="lang-btn" data-lang="es" aria-label="Español">ES</button>
                <button class="lang-btn" data-lang="de" aria-label="Deutsch">DE</button>
            </div>
        </div>
        <h1 class="main-title">Spinophore</h1>
        <h2 class="main-subtitle" data-i18n="subtitle">Minecraft Builder</h2>
    </header>

    <!-- Gallery Section -->
    <main class="gallery">
        <!-- 1 : Château japonais -->
        <div class="photo-row full">
            <div class="photo-item" 
                 data-project="japonais"
                 data-project-images='["img/chateau_japonais_minecraft.png"]'>
                <img src="img/chateau_japonais_minecraft.png" alt="Château japonais Minecraft">
            </div>
        </div>

        <!-- 2 : Cité fantastique + paysage montagnes -->
        <div class="photo-row double">
            <div class="photo-item" 
                 data-project="cite"
                 data-project-images='["img/cite_fantastique_biome_etranger.png"]'>
                <img src="img/cite_fantastique_biome_etranger.png" alt="Cité fantastique biome étranger">
            </div>
            <div class="photo-item" 
                 data-project="paysage-montagnes"
                 data-project-images='["img/paysage_montagnes_voxel.png"]'>
                <img src="img/paysage_montagnes_voxel.png" alt="Paysage montagnes voxel">
            </div>
        </div>

        <!-- 3 : Créature Spinophore -->
        <div class="photo-row full">
            <div class="photo-item" 
                 data-project="spinophore"
                 data-project-images='["img/spinophore_creature_marine.png"]'>
                <img src="img/spinophore_creature_marine.png" alt="Créature marine Spinophore">
            </div>
        </div>

        <!-- 4 : Village médiéval + mur porte/fenêtre -->
        <div class="photo-row double">
            <div class="photo-item" 
                 data-project="village"
                 data-project-images='["img/village_medieval_voxel.png"]'>
                <img src="img/village_medieval_voxel.png" alt="Village médiéval voxel">
            </div>
            <div class="photo-item" 
                 data-project="mur-porte-fenetre"
                 data-project-images='["img/mur_porte_fenetre_voxel.png"]'>
                <img src="img/mur_porte_fenetre_voxel.png" alt="Mur porte fenêtre voxel">
            </div>
        </div>

        <!-- 5 : Paysage champs + arbres -->
        <div class="photo-row full">
            <div class="photo-item" 
                 data-project="paysage-champs"
                 data-project-images='["img/champs/paysage_champs_arbres_minecraft.png"]'>
                <img src="img/champs/paysage_champs_arbres_minecraft.png" alt="Paysage champs et arbres Minecraft">
            </div>
        </div>

        <!-- 6 : Cathédrale et navires volants -->
        <div class="photo-row full">
            <div class="photo-item" 
                 data-project="cathedrale"
                 data-project-images='["img/cathedrale_navires_volants_minecraft.png"]'>
                <img src="img/cathedrale_navires_volants_minecraft.png" alt="Cathédrale et navires volants Minecraft">
            </div>
        </div>

        <!-- 7 : Bâtiment médiéval + tour sur falaise -->
        <div class="photo-row double">
            <div class="photo-item" 
                 data-project="batiment"
                 data-project-images='["img/batiment_medieval_tour_colombages.png"]'>
                <img src="img/batiment_medieval_tour_colombages.png" alt="Bâtiment médiéval tour et colombages">
            </div>
            <div class="photo-item" 
                 data-project="falaise"
                 data-project-images='["img/tour_maison_falaise_minecraft.png"]'>
                <img src="img/tour_maison_falaise_minecraft.png" alt="Tour et maison sur falaise Minecraft">
            </div>
        </div>

        <!-- 8 : Lucarne toit ardoises -->
        <div class="photo-row full">
            <div class="photo-item" 
                 data-project="lucarne"
                 data-project-images='["img/lucarne_toit_ardoises.png"]'>
                <img src="img/lucarne_toit_ardoises.png" alt="Lucarne toit ardoises">
            </div>
        </div>
    </main>

    <!-- Projets Section -->
    <section class="projets" id="projets">
        <div class="projets-container">
            <h2 class="projets-title" data-i18n="projetsTitle">Projets</h2>
            <div class="projets-grid">
                <div class="projet-item" 
                     data-project="paysages-champs"
                     data-project-images='["img/champs/paysage_champs_arbres_minecraft.png","img/champs/paysage_champs_coucher_soleil_voxel.png"]'>
                    <img src="img/champs/paysage_champs_arbres_minecraft.png" alt="Paysages de champs Minecraft">
                </div>
                <div class="projet-item" 
                     data-project="tools"
                     data-project-images='["img/ferronickel_tools.png"]'>
                    <img src="img/ferronickel_tools.png" alt="Outils ferronickel">
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact" id="contact">
        <div class="contact-container">
            <h2 class="contact-title" data-i18n="contactTitle">Contact</h2>
            <div class="contact-info">
                <div class="contact-item">
                    <span class="contact-label" data-i18n="discordLabel">Discord</span>
                    <a href="https://discord.gg/lusciana" target="_blank" rel="noopener noreferrer" class="contact-link">spinophore</a>
                </div>
                <div class="contact-item">
                    <span class="contact-label" data-i18n="twitterLabel">Twitter</span>
                    <a href="https://x.com/Spinophore" target="_blank" rel="noopener noreferrer" class="contact-link">@Spinophore</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose" data-i18n-aria="modalClose" aria-label="Fermer">×</button>
            
            <div class="modal-gallery">
                <div class="modal-main-image" id="modalMainImage">
                    <img id="modalCurrentImage" src="" alt="">
                    <button class="modal-nav modal-nav-prev" id="modalPrev" data-i18n-aria="modalPrev" aria-label="Image précédente">‹</button>
                    <button class="modal-nav modal-nav-next" id="modalNext" data-i18n-aria="modalNext" aria-label="Image suivante">›</button>
                    <div class="modal-image-counter" id="modalImageCounter"></div>
                </div>
                
                <div class="modal-thumbnails" id="modalThumbnails"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="#" class="footer-link" data-i18n="legalMentions">Mentions légales</a>
            </div>
            <div class="footer-copyright">
                <p data-i18n="copyright">&copy; 2026 Spinophore – Minecraft Builder. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
